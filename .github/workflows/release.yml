name: Build release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel Mac: GitHub retired the macos-13 hosted runner pool (jobs
          # queue forever waiting for a machine that never comes). Until
          # there's a new way to build native Intel Mac binaries in CI,
          # Apple Silicon covers the vast majority of current Mac hardware —
          # Intel users can build from source (see scripts/*.js) meanwhile.
          - os: macos-14         # Apple Silicon runner
            platform: mac-arm64
            target: mac-arm64
            make: make:mac -- --arm64
            artifact: "**/release/*-arm64.dmg"
          - os: windows-latest
            platform: win-x64
            target: win-x64
            make: make:win
            artifact: "**/release/*.exe"
          - os: ubuntu-latest
            platform: linux-x64
            target: linux-x64
            make: make:linux
            artifact: "**/release/*.AppImage"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: gui
        run: npm install

      - name: Fetch FFmpeg binaries for ${{ matrix.target }}
        run: node scripts/fetch-ffmpeg.js --target=${{ matrix.target }}

      - name: Install PyInstaller
        run: python -m pip install --quiet pyinstaller

      - name: Compile convert.py to a standalone binary (no Python required for end users)
        run: node scripts/build-convert-binary.js

      - name: Build installer
        working-directory: gui
        run: npm run ${{ matrix.make }}
        env:
          # Disable code signing on macOS (we don't have a Developer ID yet)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Don't fail if no notarization credentials
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: List built artifacts
        if: always()
        shell: bash
        run: find release -maxdepth 2 -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.yml" -o -name "*.blockmap" \) -print 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Attach installers to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Run even if one platform's build failed — attach whatever DID build
    # rather than an all-or-nothing release. A flaky/removed runner for one
    # platform shouldn't block shipping the others.
    if: always() && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f -print

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.blockmap
            artifacts/**/*.yml
          draft: false
          prerelease: false
          generate_release_notes: true
